<style>
/* ========== RESET & BASE ========== */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;overflow-x:hidden}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);line-height:1.7;overflow-x:hidden;transition:background .5s ease,color .5s ease}
a{color:var(--accent);text-decoration:none;transition:color .3s}
a:hover{color:var(--accent-glow)}
h1,h2,h3,h4{font-family:'Playfair Display',serif;line-height:1.3}
img{max-width:100%;display:block}
ul{list-style:none}
button{cursor:pointer;border:none;background:none;font-family:inherit}
:focus-visible{outline:2px solid var(--accent);outline-offset:2px;border-radius:4px}

/* ========== SKIP LINK ========== */
.skip-link{position:absolute;top:-100%;left:16px;background:var(--accent);color:#fff;padding:8px 16px;z-index:10000;border-radius:0 0 8px 8px;font-weight:600;transition:top .3s}
.skip-link:focus{top:0}

/* ========== THEME VARIABLES ========== */
/* === THEME 1: DEFAULT (dark, authoritative) â€” CUSTOMIZE THESE === */
[data-theme="Brick Oven"]{
  --bg:#1A0808;--bg-alt:#241010;--text:#F0E6DC;--text-muted:#B8A090;
  --accent:#C41E2A;--accent-glow:#E03040;--card-bg:rgba(36,16,16,0.85);
  --card-border:rgba(196,30,42,0.15);--nav-bg:rgba(26,8,8,0.88);
  --hero-overlay:rgba(26,8,8,0.6);--particle-color:196,30,42;
  --section-divider:rgba(196,30,42,0.1);
}
/* === THEME 2: ALTERNATE (dark variant) â€” CUSTOMIZE THESE === */
[data-theme="Marinara"]{
  --bg:#1C1208;--bg-alt:#281A0C;--text:#F0E4D0;--text-muted:#B89878;
  --accent:#D4A030;--accent-glow:#E8B848;--card-bg:rgba(40,26,12,0.85);
  --card-border:rgba(212,160,48,0.15);--nav-bg:rgba(28,18,8,0.88);
  --hero-overlay:rgba(28,18,8,0.65);--particle-color:212,160,48;
  --section-divider:rgba(212,160,48,0.1);
}
/* === THEME 3: LIGHT â€” CUSTOMIZE THESE === */
[data-theme="Fresh Dough"]{
  --bg:#FFF8F0;--bg-alt:#F0E8DC;--text:#1A0808;--text-muted:#6A5040;
  --accent:#C41E2A;--accent-glow:#A01520;--card-bg:rgba(255,255,255,0.9);
  --card-border:rgba(26,8,8,0.1);--nav-bg:rgba(255,248,240,0.92);
  --hero-overlay:rgba(26,8,8,0.55);--particle-color:196,30,42;
  --section-divider:rgba(26,8,8,0.08);
}

/* ========== LOADING SCREEN ========== */
#loading-screen{position:fixed;top:0;left:0;width:100%;height:100%;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:99999;transition:opacity .6s ease}
#loading-screen.fade-out{opacity:0;pointer-events:none}
#loading-screen .logo-text{font-family:'Playfair Display',serif;font-size:3rem;font-weight:700;color:var(--accent);letter-spacing:4px}
#loading-screen .compass-spinner{width:60px;height:60px;margin-top:24px;border:3px solid var(--card-border);border-top-color:var(--accent);border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ========== SCROLL PROGRESS ========== */
#scroll-progress{position:fixed;top:0;left:0;height:3px;background:linear-gradient(90deg,var(--accent),var(--accent-glow));width:0%;z-index:9999;transition:width .1s linear}

/* ========== CURSOR GLOW ========== */
#cursor-glow{position:fixed;width:600px;height:600px;border-radius:50%;background:radial-gradient(circle,rgba(var(--particle-color),0.08) 0%,transparent 70%);pointer-events:none;z-index:1;transform:translate(-50%,-50%);transition:opacity .3s;opacity:0}
body:hover #cursor-glow{opacity:1}

/* ========== NAV ========== */
.nav{position:fixed;top:0;left:0;width:100%;z-index:1000;padding:16px 40px;display:flex;align-items:center;justify-content:space-between;transition:all .4s ease}
.nav.scrolled{background:var(--nav-bg);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);box-shadow:0 2px 20px rgba(0,0,0,0.15);padding:12px 40px}
.nav-logo{font-family:'Playfair Display',serif;font-size:1.5rem;font-weight:700;color:var(--text);letter-spacing:2px}
.nav-logo span{color:var(--accent)}
.nav-links{display:flex;align-items:center;gap:32px}
.nav-links a{color:var(--text-muted);font-size:.9rem;font-weight:500;letter-spacing:.5px;text-transform:uppercase;transition:color .3s}
.nav-links a:hover{color:var(--accent)}
.nav-dropdown{position:relative}
.nav-dropdown-menu{position:absolute;top:100%;left:-16px;background:var(--card-bg);backdrop-filter:blur(20px);border:1px solid var(--card-border);border-radius:12px;padding:8px 0;min-width:220px;opacity:0;visibility:hidden;transform:translateY(8px);transition:all .3s ease;box-shadow:0 8px 32px rgba(0,0,0,0.2)}
.nav-dropdown:hover .nav-dropdown-menu{opacity:1;visibility:visible;transform:translateY(0)}
.nav-dropdown-menu a{display:block;padding:10px 20px;font-size:.85rem;text-transform:none;white-space:nowrap}
.nav-cta-btn{background:var(--accent);color:#fff !important;padding:10px 24px;border-radius:8px;font-weight:600;font-size:.85rem;letter-spacing:.5px;transition:all .3s}
.nav-cta-btn:hover{background:var(--accent-glow);transform:translateY(-1px);box-shadow:0 4px 16px rgba(var(--particle-color),0.3)}

/* ========== HAMBURGER ========== */
.hamburger{display:none;flex-direction:column;gap:5px;width:28px;cursor:pointer;z-index:1001}
.hamburger span{display:block;width:100%;height:2px;background:var(--text);transition:all .3s ease;transform-origin:center}
.hamburger.active span:nth-child(1){transform:rotate(45deg) translate(5px,5px)}
.hamburger.active span:nth-child(2){opacity:0}
.hamburger.active span:nth-child(3){transform:rotate(-45deg) translate(5px,-5px)}

/* ========== MOBILE NAV OVERLAY ========== */
.mobile-nav{position:fixed;top:0;left:0;width:100%;height:100%;background:var(--bg);z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:24px;opacity:0;visibility:hidden;transition:all .4s ease}
.mobile-nav.active{opacity:1;visibility:visible}
.mobile-nav a{font-family:'Playfair Display',serif;font-size:1.8rem;color:var(--text);transition:color .3s}
.mobile-nav a:hover{color:var(--accent)}

/* ========== HERO ========== */
.hero{position:relative;min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:120px 24px 80px;overflow:hidden}
.hero-bg-pattern{position:absolute;inset:0;opacity:.06;background-image:
  linear-gradient(30deg,var(--accent) 12%,transparent 12.5%,transparent 87%,var(--accent) 87.5%,var(--accent)),
  linear-gradient(150deg,var(--accent) 12%,transparent 12.5%,transparent 87%,var(--accent) 87.5%,var(--accent)),
  linear-gradient(30deg,var(--accent) 12%,transparent 12.5%,transparent 87%,var(--accent) 87.5%,var(--accent)),
  linear-gradient(150deg,var(--accent) 12%,transparent 12.5%,transparent 87%,var(--accent) 87.5%,var(--accent)),
  linear-gradient(60deg,rgba(var(--particle-color),0.4) 25%,transparent 25.5%,transparent 75%,rgba(var(--particle-color),0.4) 75%,rgba(var(--particle-color),0.4)),
  linear-gradient(60deg,rgba(var(--particle-color),0.4) 25%,transparent 25.5%,transparent 75%,rgba(var(--particle-color),0.4) 75%,rgba(var(--particle-color),0.4));
  background-size:80px 140px;
  background-position:0 0,0 0,40px 70px,40px 70px,0 0,40px 70px}
.hero-content{position:relative;z-index:2;max-width:820px}
.hero h1{font-size:clamp(2.4rem,5.5vw,4.2rem);font-weight:700;margin-bottom:16px;background:linear-gradient(135deg,var(--text),var(--accent),var(--text),var(--accent-glow));background-size:300% 300%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:shimmer 6s ease infinite}
@keyframes shimmer{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}
.hero .typed-line{font-size:clamp(1rem,2.2vw,1.4rem);color:var(--text-muted);min-height:2em;margin-bottom:32px}
.hero .typed-line .cursor-blink{display:inline-block;width:2px;height:1.2em;background:var(--accent);vertical-align:text-bottom;animation:blink 1s step-end infinite;margin-left:2px}
@keyframes blink{50%{opacity:0}}
.btn-primary{display:inline-block;background:var(--accent);color:#fff;padding:16px 40px;border-radius:10px;font-size:1rem;font-weight:600;letter-spacing:.5px;transition:all .3s;position:relative;overflow:hidden}
.btn-primary:hover{background:var(--accent-glow);transform:translateY(-2px);box-shadow:0 8px 30px rgba(var(--particle-color),0.35)}
.btn-primary .ripple{position:absolute;border-radius:50%;background:rgba(255,255,255,0.3);transform:scale(0);animation:ripple-anim .6s ease-out}
@keyframes ripple-anim{to{transform:scale(4);opacity:0}}

/* ========== SECTION BASE ========== */
section{position:relative;z-index:2;padding:100px 24px}
.section-alt{background:var(--bg-alt)}
.container{max-width:1140px;margin:0 auto}
.section-label{font-size:.8rem;text-transform:uppercase;letter-spacing:3px;color:var(--accent);font-weight:600;margin-bottom:8px}
.section-title{font-size:clamp(1.8rem,3.5vw,2.8rem);font-weight:700;margin-bottom:16px}
.section-subtitle{color:var(--text-muted);font-size:1.05rem;max-width:600px;margin-bottom:48px}
.text-center{text-align:center}
.text-center .section-subtitle{margin-left:auto;margin-right:auto}
.section-divider{height:1px;background:var(--section-divider);border:none;margin:0}

/* ========== STATS BAR ========== */
.stats-bar{background:var(--bg-alt);border-top:1px solid var(--section-divider);border-bottom:1px solid var(--section-divider)}
.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:24px;text-align:center;padding:24px 0}
.stat-item .stat-number{font-family:'Playfair Display',serif;font-size:clamp(2rem,4vw,3rem);font-weight:700;color:var(--accent)}
.stat-item .stat-label{font-size:.9rem;color:var(--text-muted);margin-top:4px}

/* ========== CARDS ========== */
.cards-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:32px}
.card{background:var(--card-bg);backdrop-filter:blur(12px);border:1px solid var(--card-border);border-radius:12px;padding:40px 32px;transition:all .4s ease;transform-style:preserve-3d;perspective:1000px;position:relative;overflow:hidden}
.card:hover{border-color:var(--accent);box-shadow:0 12px 40px rgba(var(--particle-color),0.12)}
.card-icon{width:48px;height:48px;color:var(--accent);margin-bottom:20px}
.card h3{font-size:1.3rem;margin-bottom:12px}
.card p{color:var(--text-muted);font-size:.95rem}

/* ========== VALUE PROPS ========== */
.value-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:40px}
.value-item{text-align:center}
.value-icon{width:64px;height:64px;color:var(--accent);margin:0 auto 20px;padding:14px;border:2px solid var(--card-border);border-radius:16px;transition:all .3s}
.value-item:hover .value-icon{border-color:var(--accent);background:rgba(var(--particle-color),0.08)}

/* ========== ABOUT ========== */
.about-grid{display:grid;grid-template-columns:1fr 1fr;gap:60px;align-items:center}
.about-badge{display:inline-block;background:rgba(var(--particle-color),0.1);border:1px solid var(--card-border);border-radius:10px;padding:16px 24px;margin-top:24px}
.about-badge strong{color:var(--accent)}

/* ========== PROCESS / TIMELINE ========== */
.timeline{display:flex;justify-content:space-between;position:relative;padding-top:40px}
.timeline::before{content:'';position:absolute;top:20px;left:0;right:0;height:2px;background:var(--card-border)}
.timeline-step{flex:1;text-align:center;position:relative;padding:0 16px}
.timeline-dot{width:40px;height:40px;border-radius:50%;background:var(--card-bg);border:2px solid var(--accent);display:flex;align-items:center;justify-content:center;margin:0 auto 20px;position:relative;z-index:2;color:var(--accent);font-weight:700;font-size:.9rem;transition:all .3s}
.timeline-step:hover .timeline-dot{background:var(--accent);color:#fff}
.timeline-step h4{font-size:1.05rem;margin-bottom:8px}
.timeline-step p{font-size:.85rem;color:var(--text-muted)}

/* ========== TESTIMONIALS ========== */
.testimonials-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:32px}
.testimonial-card{background:var(--card-bg);backdrop-filter:blur(12px);border:1px solid var(--card-border);border-radius:12px;padding:32px;position:relative}
.testimonial-card .quote-icon{color:var(--accent);opacity:.3;margin-bottom:12px}
.testimonial-card blockquote{font-style:italic;color:var(--text-muted);font-size:.95rem;line-height:1.7;margin-bottom:16px}
.testimonial-author{font-weight:600;font-size:.9rem;color:var(--text)}
.testimonial-role{font-size:.8rem;color:var(--text-muted)}

/* ========== FAQ ========== */
.faq-list{max-width:760px;margin:0 auto}
.faq-item{border:1px solid var(--card-border);border-radius:12px;margin-bottom:12px;overflow:hidden;transition:border-color .3s}
.faq-item.active{border-color:var(--accent)}
.faq-question{display:flex;align-items:center;justify-content:space-between;padding:20px 24px;cursor:pointer;font-weight:600;font-size:1rem;transition:color .3s;background:var(--card-bg)}
.faq-question:hover{color:var(--accent)}
.faq-question svg{width:20px;height:20px;transition:transform .3s;flex-shrink:0;color:var(--accent)}
.faq-item.active .faq-question svg{transform:rotate(180deg)}
.faq-answer{max-height:0;overflow:hidden;transition:max-height .4s ease}
.faq-answer-inner{padding:0 24px 20px;color:var(--text-muted);font-size:.95rem;line-height:1.7}

/* ========== CTA SECTION ========== */
.cta-section{background:linear-gradient(135deg,var(--bg),var(--bg-alt));text-align:center}
.contact-form{max-width:560px;margin:0 auto;display:flex;flex-direction:column;gap:16px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.form-input{background:var(--card-bg);border:1px solid var(--card-border);border-radius:10px;padding:14px 18px;color:var(--text);font-size:.95rem;font-family:'Inter',sans-serif;transition:border-color .3s;width:100%}
.form-input:focus{border-color:var(--accent);outline:none}
textarea.form-input{resize:vertical;min-height:120px}
.form-input::placeholder{color:var(--text-muted)}

/* ========== FOOTER ========== */
.footer{background:var(--bg-alt);border-top:1px solid var(--section-divider);padding:60px 24px 32px;position:relative;z-index:2}
.footer-grid{display:grid;grid-template-columns:2fr 1fr 1fr 1fr;gap:40px;max-width:1140px;margin:0 auto}
.footer h4{font-size:.85rem;text-transform:uppercase;letter-spacing:2px;color:var(--accent);margin-bottom:16px}
.footer a{color:var(--text-muted);font-size:.9rem;display:block;margin-bottom:8px;transition:color .3s}
.footer a:hover{color:var(--accent)}
.footer-about p{color:var(--text-muted);font-size:.85rem;line-height:1.6}
.footer-bottom{max-width:1140px;margin:40px auto 0;padding-top:24px;border-top:1px solid var(--section-divider)}
.footer-disclosures{color:var(--text-muted);font-size:.75rem;line-height:1.7;margin-bottom:16px}
.footer-disclosures a{display:inline;font-size:.75rem}
.footer-credit{text-align:center;color:var(--text-muted);font-size:.8rem;margin-top:16px}

/* ========== THEME SWITCHER (right rail) ========== */
.theme-switcher{position:fixed;right:16px;top:50%;transform:translateY(-50%);z-index:9000;display:flex;flex-direction:column;align-items:center;gap:12px;background:rgba(var(--particle-color),0.06);backdrop-filter:blur(16px);border:1px solid var(--card-border);border-radius:20px;padding:16px 10px}
.theme-switcher .label{writing-mode:vertical-rl;text-orientation:mixed;font-size:.65rem;letter-spacing:2px;text-transform:uppercase;color:var(--text-muted);font-weight:600;margin-bottom:4px}
.theme-dot{width:20px;height:20px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all .3s;position:relative}
.theme-dot:hover{transform:scale(1.2)}
.theme-dot.active{border-color:#fff;box-shadow:0 0 12px rgba(var(--particle-color),0.5)}
/* === THEME DOT COLORS â€” CUSTOMIZE THESE === */
.theme-dot[data-theme="Brick Oven"]{
  --bg:#1A0808;--bg-alt:#241010;--text:#F0E6DC;--text-muted:#B8A090;
  --accent:#C41E2A;--accent-glow:#E03040;--card-bg:rgba(36,16,16,0.85);
  --card-border:rgba(196,30,42,0.15);--nav-bg:rgba(26,8,8,0.88);
  --hero-overlay:rgba(26,8,8,0.6);--particle-color:196,30,42;
  --section-divider:rgba(196,30,42,0.1);
}
.theme-dot[data-theme="Marinara"]{
  --bg:#1C1208;--bg-alt:#281A0C;--text:#F0E4D0;--text-muted:#B89878;
  --accent:#D4A030;--accent-glow:#E8B848;--card-bg:rgba(40,26,12,0.85);
  --card-border:rgba(212,160,48,0.15);--nav-bg:rgba(28,18,8,0.88);
  --hero-overlay:rgba(28,18,8,0.65);--particle-color:212,160,48;
  --section-divider:rgba(212,160,48,0.1);
}
.theme-dot[data-theme="Fresh Dough"]{
  --bg:#FFF8F0;--bg-alt:#F0E8DC;--text:#1A0808;--text-muted:#6A5040;
  --accent:#C41E2A;--accent-glow:#A01520;--card-bg:rgba(255,255,255,0.9);
  --card-border:rgba(26,8,8,0.1);--nav-bg:rgba(255,248,240,0.92);
  --hero-overlay:rgba(26,8,8,0.55);--particle-color:196,30,42;
  --section-divider:rgba(26,8,8,0.08);
}

/* ========== VOICE SWITCHER (bottom left) ========== */
.voice-switcher{position:fixed;bottom:24px;left:24px;z-index:9000;display:flex;align-items:center;gap:8px}
.voice-toggle{width:44px;height:44px;border-radius:50%;background:rgba(var(--particle-color),0.08);backdrop-filter:blur(16px);border:1px solid var(--card-border);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .3s;color:var(--accent)}
.voice-toggle:hover{background:rgba(var(--particle-color),0.15)}
.voice-dots{display:flex;gap:6px;background:rgba(var(--particle-color),0.06);backdrop-filter:blur(16px);border:1px solid var(--card-border);border-radius:24px;padding:8px 14px;opacity:0;visibility:hidden;transform:translateX(-10px);transition:all .3s}
.voice-switcher.expanded .voice-dots{opacity:1;visibility:visible;transform:translateX(0)}
.voice-dot{width:18px;height:18px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all .3s;display:flex;align-items:center;justify-content:center;font-size:.55rem;font-weight:700;color:#fff}
.voice-dot:hover{transform:scale(1.15)}
.voice-dot.active{border-color:#fff;box-shadow:0 0 8px rgba(var(--particle-color),0.4)}
.voice-dot[data-voice="founder"]{background:#8B4513}
.voice-dot[data-voice="pizzaiolo"]{background:#C41E2A}
.voice-dot[data-voice="neighbor"]{background:#6B8E5A}
.voice-dot[data-voice="critic"]{background:#7B5EA7}
.voice-dot[data-voice="detroit"]{background:#4A6FA5}
.voice-dot[data-voice="gameday"]{background:#D4A030}
.voice-dot[data-voice="franchise"]{background:#555}

/* ========== ANIMATION SWITCHER (left rail) ========== */
.anim-switcher{position:fixed;left:16px;top:50%;transform:translateY(-50%);z-index:9000;display:flex;flex-direction:column;align-items:center;gap:8px;background:rgba(var(--particle-color),0.06);backdrop-filter:blur(16px);border:1px solid var(--card-border);border-radius:20px;padding:14px 8px}
.anim-switcher .label{writing-mode:vertical-rl;text-orientation:mixed;font-size:.65rem;letter-spacing:2px;text-transform:uppercase;color:var(--text-muted);font-weight:600;margin-bottom:4px}
.anim-dot{width:18px;height:18px;border-radius:50%;cursor:pointer;border:2px solid var(--card-border);background:var(--card-bg);transition:all .3s;display:flex;align-items:center;justify-content:center;font-size:.5rem;color:var(--text-muted)}
.anim-dot:hover{border-color:var(--accent);color:var(--accent)}
.anim-dot.active{border-color:var(--accent);background:rgba(var(--particle-color),0.15);color:var(--accent)}

/* ========== COMPASS POWER BUTTON ========== */
.compass-btn{position:fixed;bottom:24px;right:24px;z-index:9000;width:52px;height:52px;border-radius:50%;background:var(--card-bg);backdrop-filter:blur(16px);border:1px solid var(--card-border);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .3s;color:var(--text-muted)}
.compass-btn:hover{border-color:var(--accent);color:var(--accent)}
.compass-btn.active{border-color:var(--accent);color:var(--accent);box-shadow:0 0 20px rgba(var(--particle-color),0.4);animation:compass-pulse 2s ease infinite}
@keyframes compass-pulse{0%,100%{box-shadow:0 0 20px rgba(var(--particle-color),0.4)}50%{box-shadow:0 0 35px rgba(var(--particle-color),0.6)}}
.compass-btn svg{transition:transform .5s ease}
.compass-btn.active svg{transform:rotate(360deg)}

/* ========== REVEAL ANIMATIONS ========== */
.reveal{opacity:0;transform:translateY(30px);transition:opacity .7s ease,transform .7s ease}
.reveal.visible{opacity:1;transform:translateY(0)}
.reveal-delay-1{transition-delay:.1s}
.reveal-delay-2{transition-delay:.2s}
.reveal-delay-3{transition-delay:.3s}
.reveal-delay-4{transition-delay:.4s}

/* ========== CANVAS ========== */
#bg-canvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none}

/* ========== RESPONSIVE ========== */
@media(max-width:1024px){
  .nav-links{display:none}
  .hamburger{display:flex}
  .footer-grid{grid-template-columns:1fr 1fr}
  .about-grid{grid-template-columns:1fr;gap:40px}
  .value-grid{grid-template-columns:1fr 1fr;gap:24px}
  .timeline{flex-direction:column;gap:32px;padding-top:0}
  .timeline::before{top:0;bottom:0;left:20px;right:auto;width:2px;height:100%}
  .timeline-step{text-align:left;padding-left:60px}
  .timeline-dot{position:absolute;left:0}
}
@media(max-width:768px){
  section{padding:60px 20px}
  .cards-grid{grid-template-columns:1fr}
  .stats-grid{grid-template-columns:1fr;gap:16px}
  .form-row{grid-template-columns:1fr}
  .footer-grid{grid-template-columns:1fr}
  .value-grid{grid-template-columns:1fr}
  .anim-switcher{left:8px;padding:10px 6px}
  .theme-switcher{right:8px;padding:10px 6px}
}
@media(max-width:480px){
  .hero h1{font-size:2rem}
  .nav{padding:12px 16px}
  .nav-logo{font-size:1.2rem}
}

/* ========== PRINT ========== */
@media print{
  .nav,.theme-switcher,.voice-switcher,.anim-switcher,.compass-btn,#cursor-glow,#bg-canvas,#loading-screen,#scroll-progress,.hamburger,.mobile-nav{display:none !important}
  body{background:#fff;color:#000}
  section{padding:24px 0;break-inside:avoid}
  .card{border:1px solid #ccc;box-shadow:none;background:#fff}
  .hero{min-height:auto;padding:40px 0}
  .hero h1{-webkit-text-fill-color:#000;background:none}
  .btn-primary{border:1px solid #000;color:#000;background:#fff}
}

/* ========== VOICE CROSSFADE ========== */
[data-voice-key]{transition:opacity .3s ease}
[data-voice-key].voice-fading{opacity:0}
